name: docker-arm64-ghcr

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/docker-arm64-ghcr.yml'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'sql/**'
      - 'configs/**'
      - 'web/**'
      - 'deploy/Dockerfile'
      - 'deploy/entrypoint.sh'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gpt2api

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build backend + goose for linux/arm64
        run: |
          mkdir -p deploy/bin
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o deploy/bin/gpt2api ./cmd/server
          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "$TMPDIR"' EXIT
          pushd "$TMPDIR"
          go mod init goose-wrapper
          go get github.com/pressly/goose/v3/cmd/goose@v3.20.0
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o "$GITHUB_WORKSPACE/deploy/bin/goose" github.com/pressly/goose/v3/cmd/goose
          popd
          file deploy/bin/gpt2api deploy/bin/goose

      - name: Build frontend
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push linux/arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
